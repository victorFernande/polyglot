services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polyglot-backend
    ports:
      - "0.0.0.0:8095:8000"
    volumes:
      - ./backend:/app
      - polyglot-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/polyglot.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polyglot-frontend
    ports:
      - "0.0.0.0:3030:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8095
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  polyglot-data:
